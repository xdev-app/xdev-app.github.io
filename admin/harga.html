---
layout: default
title: Admin Update Harga
---

<section class="update-header">
  <h1>Admin Update Harga</h1>
  <p>Masukkan GitHub Personal Access Token (PAT) untuk menyimpan perubahan ke <strong>_data/harga.yml</strong>. Token tidak disimpan di server.</p>
</section>

<div class="stock-status-container" style="padding:20px;">
  <div style="margin-bottom:15px;">
    <label for="pat" style="display:block; color:#ccc; margin-bottom:6px;">GitHub PAT (repo scope):</label>
    <input id="pat" type="password" placeholder="token" style="width:100%; max-width:420px; padding:10px; border-radius:6px; border:1px solid #333; background:#1a1a1a; color:#e0e0e0;">
  </div>
  <table class="stock-table" id="priceTable">
    <thead>
      <tr>
        <th>Produk</th>
        <th>Kategori</th>
        <th>Harga</th>
        <th>Satuan</th>
        <th>Stok</th>
        <th>Foto</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div style="margin-top:15px;">
    <button id="addRow" class="share-btn">Tambah Baris</button>
    <button id="saveBtn" class="btn-wa" style="margin-left:10px;">Simpan ke GitHub</button>
  </div>
</div>

<script>
const items = {{ site.data.harga | jsonify }};
const owner = "{{ site.github_owner }}";
const repo = "{{ site.github_repo }}";
const path = "_data/harga.yml";
const branch = "main";

function render() {
  const tbody = document.querySelector("#priceTable tbody");
  tbody.innerHTML = "";
  items.forEach((it, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><input value="${it.produk || ""}" data-k="produk" data-i="${idx}" style="width:180px"></td>
      <td><input value="${it.kategori || ""}" data-k="kategori" data-i="${idx}" style="width:160px"></td>
      <td><input value="${it.harga || ""}" data-k="harga" data-i="${idx}" style="width:120px"></td>
      <td><input value="${it.satuan || ""}" data-k="satuan" data-i="${idx}" style="width:80px"></td>
      <td><input value="${it.stok || ""}" data-k="stok" data-i="${idx}" style="width:100px"></td>
      <td><input value="${it.foto || ""}" data-k="foto" data-i="${idx}" style="width:160px"></td>
      <td><button class="share-btn" data-del="${idx}">Hapus</button></td>
    `;
    tbody.appendChild(tr);
  });
}
render();

document.addEventListener("input", (e) => {
  const k = e.target.getAttribute("data-k");
  const i = e.target.getAttribute("data-i");
  if (k && i !== null) {
    items[Number(i)][k] = e.target.value;
  }
});

document.addEventListener("click", (e) => {
  const del = e.target.getAttribute("data-del");
  if (del !== null) {
    items.splice(Number(del), 1);
    render();
  }
});

document.getElementById("addRow").addEventListener("click", () => {
  items.push({ produk:"", kategori:"", harga:"", satuan:"", stok:"", foto:"" });
  render();
});

function toYAML(arr) {
  let out = "";
  arr.forEach(obj => {
    out += `- produk: "${(obj.produk||"").replace(/"/g,'\\"')}"\n`;
    out += `  harga: "${(obj.harga||"").replace(/"/g,'\\"')}"\n`;
    out += `  satuan: "${(obj.satuan||"").replace(/"/g,'\\"')}"\n`;
    out += `  stok: "${(obj.stok||"").replace(/"/g,'\\"')}"\n`;
    out += `  kategori: "${(obj.kategori||"").replace(/"/g,'\\"')}"\n`;
    out += `  foto: "${(obj.foto||"").replace(/"/g,'\\"')}"\n\n`;
  });
  return out.trim() + "\n";
}

async function saveToGitHub() {
  const token = document.getElementById("pat").value.trim();
  if (!token) { alert("Masukkan PAT GitHub terlebih dahulu"); return; }
  const headers = { "Authorization": `token ${token}`, "Accept":"application/vnd.github+json" };
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const getResp = await fetch(url, { headers });
  if (!getResp.ok) { alert("Gagal mengambil file: " + getResp.status); return; }
  const file = await getResp.json();
  const yaml = toYAML(items);
  const content = btoa(unescape(encodeURIComponent(yaml)));
  const body = {
    message: "Update harga via Admin Panel",
    content,
    sha: file.sha,
    branch
  };
  const putResp = await fetch(url, { method:"PUT", headers: { ...headers, "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if (putResp.ok) {
    alert("Berhasil menyimpan. Perubahan akan terpublikasi setelah build selesai.");
  } else {
    const t = await putResp.text();
    alert("Gagal menyimpan: " + putResp.status + " " + t);
  }
}
document.getElementById("saveBtn").addEventListener("click", saveToGitHub);
</script>
