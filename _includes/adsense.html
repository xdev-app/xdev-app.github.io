<div class="ad-banner">
  {% if site.adsense_client and site.adsense_slot %}
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.adsense_client }}" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="{{ site.adsense_client }}" data-ad-slot="{{ site.adsense_slot }}" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
  {% else %}
    <div class="ad-placeholder">Space Iklan</div>
  {% endif %}
</div>
