---
layout: default
---

<section class="post">
  <div class="post-container">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}</p>
    <div class="post-content">
      {{ content }}
    </div>
  </div>
  <div class="post-actions">
    <a href="/blog" class="read-more">← Kembali ke Blog</a>
  </div>
</section>
